<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workin’Store | Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="bg-animated"></div>

    <header id="main-header">
        <div class="logo">Workin’Store</div>
        <nav id="nav-links">
            <ul id="menu-items"></ul>
        </nav>
        <!-- Botão mais discreto -->
        <button id="btn-admin" class="btn-subtle">Acesso Restrito</button>
    </header>

    <main>
        <section id="vitrine" class="vitrine"></section>

        <section id="servicos" class="servicos-grid"></section>

        <!-- Painel Admin Expandido -->
        <section id="admin-panel" class="hidden">
            <h2>Painel Administrativo</h2>
            <div class="admin-controls">
                <button onclick="exportarDados()" class="btn-neon">Exportar JSON</button>
                <button onclick="importarDados()" class="btn-neon">Importar JSON</button>
                <div id="editor-area">
                    <h3>Configurações do Portal</h3>
                    <!-- Campos para gerenciamento de links/cards -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; Workin’Store 2026 - Todos os direitos reservados</p>
    </footer>

    <!-- Modal Login Ajustado -->
    <div id="modal-admin" class="modal">
        <div class="modal-content login-box">
            <h3>Login Admin</h3>
            <div class="input-group">
                <input type="email" id="email-admin" placeholder="Email">
                <input type="password" id="password-admin" placeholder="Senha">
            </div>
            <button id="login-btn" class="btn-neon">Entrar</button>
        </div>
    </div>

    <div id="modal-generic" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('modal-generic').style.display='none'">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
