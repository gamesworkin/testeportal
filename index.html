<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workin’Store | Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="bg-animated"></div>

    <header id="main-header">
        <nav id="nav-links"></nav>
        <button id="btn-admin">Acesso Restrito</button>
    </header>

    <main>
        <div id="vitrine" class="vitrine"></div>
        <section id="servicos" class="servicos-grid"></section>
    </main>

    <!-- Modal Admin -->
    <div id="modal-admin" class="modal">
        <div class="modal-content">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Senha">
            <button id="login-btn">Entrar</button>
        </div>
    </div>

    <!-- Modal Geral -->
    <div id="modal-generic" class="modal"><div class="modal-content" id="modal-body"></div></div>

    <script src="script.js"></script>
</body>
</html>
